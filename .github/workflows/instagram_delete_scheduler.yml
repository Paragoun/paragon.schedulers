name: INSTAGRAM DELETE SCHEDULER

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'   # 11:30 PM IST (6:00 PM UTC)
    - cron: '30 9 * * *'    # 3:00 PM IST (9:30 AM UTC)
    - cron: '0 6 * * *'    # 11:30 AM IST (6:00 AM UTC)
  
jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: Paragoun/paragon
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            INSTAGRAM/
            requirements.txt
          fetch-depth: 1
          
      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'  # Specify the Python version you need

      # Install the necessary packages
      - name: Installed package list
        run: apt list --installed
        
      # Install dependencies
      - name: Install dependencies
        run: |
         python3 -m pip install --upgrade pip
         pip3 install -r requirements.txt

      # Run your Python script
      - name: Run Python script
        run: python3 INSTAGRAM/instagram_delete.py

      # Commit queue updates
      - name: Commit and Push Queue Updates
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add INSTAGRAM/media_id.txt
          git commit -m "Update Instagram media delete queue" || echo "No changes to commit"
          git pull --rebase origin main || echo "No changes to pull"
          git push || echo "No changes to push"
